<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login - SmartLibrary</title>
<link rel="stylesheet" href="student-login.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <h2>🎓 Student Login</h2>

        <form id="loginForm">
            <input type="text" id="studentId" placeholder="Enter Student ID (y23cd084)" required>
            <input type="password" id="password" placeholder="Enter Password" required>
            <button type="submit">Login</button>
            <p id="errorMsg"></p>
        </form>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const id = document.getElementById("studentId").value.trim();
    const pass = document.getElementById("password").value.trim();

    const validStudents = ["y23cd084", "y23cd090"];
    const validPassword = "1234";

    if(validStudents.includes(id) && pass === validPassword){
        localStorage.setItem("studentId", id);
        window.location.href = "student.html";
    } else {
        document.getElementById("errorMsg").textContent = "Invalid ID or Password";
    }
});
</script>

</body>
</html>
