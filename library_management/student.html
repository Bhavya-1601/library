
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LibNova Student Portal</title>

<link rel="stylesheet" href="student-dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<div class="sidebar">

<h2 class="logo">📚 <span>LibNova</span></h2>

<ul>

<li onclick="showSection(event,'dashboard')" class="active">
<i class="fa fa-chart-line"></i> Dashboard
</li>

<li onclick="showSection(event,'search')">
<i class="fa fa-book"></i> Search Books
</li>

<li onclick="showSection(event,'requests')">
<i class="fa fa-envelope"></i> My Requests
</li>

<li onclick="showSection(event,'mybooks')">
<i class="fa fa-book-open"></i> Issued Books
</li>

<li onclick="showSection(event,'activity')">
<i class="fa fa-clock"></i> Activity
</li>

<li onclick="showSection(event,'profile')">
<i class="fa fa-user"></i> Profile
</li>

<li onclick="logout()">
<i class="fa fa-sign-out-alt"></i> Logout
</li>

</ul>

</div>

<div class="main-content">

<h1 id="welcomeText"></h1>

<!-- DASHBOARD -->

<div id="dashboardSection" class="section">

<h2>📊 Library Overview</h2>

<div class="cards">

<div class="card">
<h3>Requests</h3>
<p id="requestCount">0</p>
</div>

<div class="card">
<h3>Issued Books</h3>
<p id="issuedCount">0</p>
</div>

<div class="card">
<h3>Total Fine</h3>
<p>₹<span id="fine">0</span></p>
</div>

</div>

</div>

<!-- SEARCH -->

<div id="searchSection" class="section" style="display:none">

<h2>🔎 Search Books</h2>

<input id="searchInput"
placeholder="Search books..."
onkeyup="loadBooks()">

<select id="branchFilter" onchange="loadBooks()">

<option value="All">All Branches</option>
<option value="CSE">CSE</option>
<option value="ECE">ECE</option>
<option value="MECH">MECH</option>

</select>

<div id="bookList" class="book-grid"></div>

</div>

<!-- REQUESTS -->

<div id="requestsSection" class="section" style="display:none">

<h2>📨 My Book Requests</h2>

<div id="requestList"></div>

</div>

<!-- ISSUED BOOKS -->

<div id="mybooksSection" class="section" style="display:none">

<h2>📚 Issued Books</h2>

<div id="issuedList"></div>

</div>

<!-- ACTIVITY -->

<div id="activitySection" class="section" style="display:none">

<h2>📜 Activity</h2>

<div id="activityList"></div>

</div>

<!-- PROFILE -->

<div id="profileSection" class="section" style="display:none">

<h2>👤 Profile</h2>

<p>ID: <span id="profileId"></span></p>
<p>Email: <span id="profileEmail"></span></p>

</div>

</div>
</div>

<script>

const studentId = localStorage.getItem("studentId");

if(!studentId){
window.location.href="login.html";
}

document.getElementById("welcomeText").textContent =
"Welcome "+studentId+" 👋";

/* BOOK DATABASE */

const books=[

{id:1,title:"Data Structures",author:"Mark Allen",branch:"CSE",stock:5},
{id:2,title:"Operating Systems",author:"Galvin",branch:"CSE",stock:4},
{id:3,title:"DBMS",author:"Korth",branch:"CSE",stock:6},

{id:4,title:"Signals & Systems",author:"Oppenheim",branch:"ECE",stock:3},
{id:5,title:"Digital Electronics",author:"Mano",branch:"ECE",stock:4},

{id:6,title:"Thermodynamics",author:"Cengel",branch:"MECH",stock:2}

];

/* STORAGE */

if(!localStorage.getItem("requests"))
localStorage.setItem("requests",JSON.stringify([]));

if(!localStorage.getItem("issued"))
localStorage.setItem("issued",JSON.stringify([]));

if(!localStorage.getItem("activity"))
localStorage.setItem("activity",JSON.stringify([]));

/* NAVIGATION */

function showSection(e,section){

document.querySelectorAll(".section")
.forEach(s=>s.style.display="none");

document.getElementById(section+"Section").style.display="block";

document.querySelectorAll(".sidebar li")
.forEach(li=>li.classList.remove("active"));

e.currentTarget.classList.add("active");

loadBooks();
loadRequests();
loadIssued();
loadActivity();
updateDashboard();

}

/* SEARCH */

function loadBooks(){

let query=document.getElementById("searchInput").value.toLowerCase();
let branch=document.getElementById("branchFilter").value;

let container=document.getElementById("bookList");
container.innerHTML="";

books
.filter(b=>
(b.title.toLowerCase().includes(query) ||
b.author.toLowerCase().includes(query))
&& (branch==="All" || b.branch===branch)
)

.forEach(book=>{

container.innerHTML+=`

<div class="book-card">

<h3>${book.title}</h3>

<p>${book.author}</p>

<p>Branch: ${book.branch}</p>

<p>Stock: ${book.stock}</p>

<button onclick="requestBook(${book.id})">
Request Book
</button>

</div>

`;

});

}

/* REQUEST BOOK */

function requestBook(id){

let req=JSON.parse(localStorage.getItem("requests"));
let book=books.find(b=>b.id===id);

req.push({
student:studentId,
bookId:id,
title:book.title
});

localStorage.setItem("requests",JSON.stringify(req));

addActivity("Requested "+book.title);

alert("Request sent to librarian");

updateDashboard();
}

/* LOAD REQUESTS */

function loadRequests(){

let req=JSON.parse(localStorage.getItem("requests"));

let container=document.getElementById("requestList");
container.innerHTML="";

req
.filter(r=>r.student===studentId)
.forEach(r=>{

container.innerHTML+=`

<div class="data-card">

${r.title}

<span>Pending Approval</span>

</div>

`;

});

}

/* ISSUED */

function loadIssued(){

let issued=JSON.parse(localStorage.getItem("issued"));

let container=document.getElementById("issuedList");
container.innerHTML="";

issued
.filter(b=>b.student===studentId)
.forEach(b=>{

container.innerHTML+=`

<div class="data-card">

${b.title}

</div>

`;

});

}

/* ACTIVITY */

function addActivity(text){

let act=JSON.parse(localStorage.getItem("activity"));

act.unshift({
text:text,
time:new Date().toLocaleString()
});

localStorage.setItem("activity",JSON.stringify(act));

}

function loadActivity(){

let act=JSON.parse(localStorage.getItem("activity"));

let container=document.getElementById("activityList");
container.innerHTML="";

act.forEach(a=>{

container.innerHTML+=`
<p>${a.text} — ${a.time}</p>
`;

});

}

/* DASHBOARD */

function updateDashboard(){

let req=JSON.parse(localStorage.getItem("requests"));
let issued=JSON.parse(localStorage.getItem("issued"));

document.getElementById("requestCount").textContent =
req.filter(r=>r.student===studentId).length;

document.getElementById("issuedCount").textContent =
issued.filter(b=>b.student===studentId).length;

}

/* PROFILE */

document.getElementById("profileId").textContent=studentId;
document.getElementById("profileEmail").textContent=studentId+"@college.edu";

/* LOGOUT */

function logout(){

localStorage.removeItem("studentId");

window.location.href="index.html";

}

updateDashboard();
loadBooks();

</script>

</body>
</html>
