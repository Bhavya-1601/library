<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LibNova Login Portal</title>

<link rel="stylesheet" href="login.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="login-container">

<div class="login-box">

<h1>📚 LibNova</h1>

<div class="tabs">

<button class="tab active" onclick="switchTab('student')">🎓 Student</button>

<button class="tab" onclick="switchTab('employee')">👨‍💼 Employee</button>

</div>


<div id="studentForm" class="form active">

<input id="studentId" placeholder="Student ID">

<input type="password" id="studentPass" placeholder="Password">

<button onclick="studentLogin()">Login</button>

</div>


<div id="employeeForm" class="form">

<input id="empId" placeholder="Employee ID">

<input type="password" id="empPass" placeholder="Password">

<button onclick="employeeLogin()">Login</button>

</div>

<p id="errorMsg"></p>

</div>

</div>

<script>

function switchTab(type){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".form").forEach(f=>f.classList.remove("active"));

if(type==="student"){
document.querySelectorAll(".tab")[0].classList.add("active");
document.getElementById("studentForm").classList.add("active");
}else{
document.querySelectorAll(".tab")[1].classList.add("active");
document.getElementById("employeeForm").classList.add("active");
}

}

function studentLogin(){

let id=document.getElementById("studentId").value.trim().toLowerCase();
let pass=document.getElementById("studentPass").value.trim();

const validStudents=["y23cd084","y23cd090"];

if(validStudents.includes(id) && pass==="1234"){

localStorage.setItem("studentId",id);

window.location.href="student.html";

}else{

document.getElementById("errorMsg").textContent="Invalid Student Login";

}

}

function employeeLogin(){

let id=document.getElementById("empId").value.trim().toUpperCase();
let pass=document.getElementById("empPass").value.trim();

const validEmployees=["EMP001","EMP002","EMP003"];

if(validEmployees.includes(id) && pass==="1234"){

localStorage.setItem("employeeId",id);

window.location.href="employee-dashboard.html";

}else{

document.getElementById("errorMsg").textContent="Invalid Employee Login";

}

}

</script>

</body>
</html>
