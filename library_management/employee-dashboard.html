
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LibNova Admin Dashboard</title>

<link rel="stylesheet" href="employee-dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h2 class="logo">📚 LibNova</h2>

<ul>

<li onclick="showSection('dashboard')" class="active">
<i class="fa fa-chart-line"></i> Dashboard
</li>

<li onclick="showSection('books')">
<i class="fa fa-book"></i> Manage Books
</li>

<li onclick="showSection('requests')">
<i class="fa fa-envelope"></i> Book Requests
</li>

<li onclick="showSection('students')">
<i class="fa fa-users"></i> Students
</li>

<li onclick="showSection('branches')">
<i class="fa fa-building"></i> Branch Libraries
</li>

<li onclick="logout()">
<i class="fa fa-sign-out-alt"></i> Logout
</li>

</ul>

</div>


<!-- MAIN CONTENT -->

<div class="main-content">

<h1 id="welcomeText"></h1>


<!-- DASHBOARD -->

<div id="dashboardSection" class="section">

<div class="cards">

<div class="card">
<h3>Total Books</h3>
<p id="totalBooks"></p>
</div>

<div class="card">
<h3>Total Stock</h3>
<p id="totalStock"></p>
</div>

<div class="card">
<h3>Issued Books</h3>
<p id="issuedCount"></p>
</div>

<div class="card">
<h3>Requests</h3>
<p id="requestCount"></p>
</div>

</div>

</div>


<!-- MANAGE BOOKS -->

<div id="booksSection" class="section" style="display:none">

<h2>Manage Books</h2>

<div class="form-row">

<input id="titleInput" placeholder="Book Title">
<input id="authorInput" placeholder="Author">

<select id="branchInput">
<option value="Central">Central</option>
<option value="CSE">CSE</option>
<option value="ECE">ECE</option>
<option value="MECH">Mechanical</option>
</select>

<input id="stockInput" type="number" placeholder="Stock">

<button onclick="addBook()">Add Book</button>

</div>

<div id="bookList"></div>

</div>


<!-- REQUESTS -->

<div id="requestsSection" class="section" style="display:none">

<h2>Student Book Requests</h2>

<div id="requestList"></div>

</div>


<!-- STUDENTS -->

<div id="studentsSection" class="section" style="display:none">

<h2>Student Records</h2>

<div id="studentList"></div>

</div>


<!-- BRANCHES -->

<div id="branchesSection" class="section" style="display:none">

<h2>Branch Libraries</h2>

<button onclick="showBranch('Central')">Central</button>
<button onclick="showBranch('CSE')">CSE</button>
<button onclick="showBranch('ECE')">ECE</button>
<button onclick="showBranch('MECH')">Mechanical</button>

<h3 id="branchTitle"></h3>

<div id="branchBooks"></div>

</div>

</div>

</div>


<script>

const employeeId = localStorage.getItem("employeeId") || "EMP001";

document.getElementById("welcomeText").textContent =
"Welcome Admin " + employeeId + " 👋";


/* DEFAULT BOOK DATA */

if(!localStorage.getItem("books")){

localStorage.setItem("books",JSON.stringify([

{id:1,title:"Data Structures",author:"Mark Allen",branch:"CSE",stock:5},
{id:2,title:"Operating Systems",author:"Galvin",branch:"CSE",stock:3},
{id:3,title:"DBMS",author:"Korth",branch:"Central",stock:4}

]));

}


/* REQUEST DATA */

if(!localStorage.getItem("requests")){
localStorage.setItem("requests",JSON.stringify([
{student:"y23cd084",bookId:1}
]));
}

if(!localStorage.getItem("issuedBooks")){
localStorage.setItem("issuedBooks",JSON.stringify([]));
}


/* STORAGE HELPERS */

function getBooks(){
return JSON.parse(localStorage.getItem("books"));
}

function getRequests(){
return JSON.parse(localStorage.getItem("requests"));
}

function getIssued(){
return JSON.parse(localStorage.getItem("issuedBooks"));
}


/* NAVIGATION */

function showSection(section){

document.querySelectorAll(".section")
.forEach(s=>s.style.display="none");

document.getElementById(section+"Section").style.display="block";

}


/* DASHBOARD */

function loadDashboard(){

let books=getBooks();
let issued=getIssued();
let requests=getRequests();

document.getElementById("totalBooks").textContent=books.length;

document.getElementById("totalStock").textContent=
books.reduce((sum,b)=>sum+b.stock,0);

document.getElementById("issuedCount").textContent=issued.length;

document.getElementById("requestCount").textContent=requests.length;

}


/* BOOK LIST */

function loadBooks(){

let books=getBooks();

let container=document.getElementById("bookList");

container.innerHTML="";

books.forEach((b,i)=>{

container.innerHTML+=`

<div class="book-card">

<b>${b.title}</b> (${b.author})
<br>
Branch: ${b.branch || "Central"}
<br>
Stock: ${b.stock}

<button onclick="deleteBook(${i})">Delete</button>

</div>

`;

});

}


/* ADD BOOK */

function addBook(){

let books=getBooks();

let title=document.getElementById("titleInput").value;
let author=document.getElementById("authorInput").value;
let branch=document.getElementById("branchInput").value;
let stock=parseInt(document.getElementById("stockInput").value);

books.push({
id:Date.now(),
title,
author,
branch,
stock
});

localStorage.setItem("books",JSON.stringify(books));

loadBooks();
loadDashboard();

}


/* DELETE BOOK */

function deleteBook(i){

let books=getBooks();

books.splice(i,1);

localStorage.setItem("books",JSON.stringify(books));

loadBooks();
loadDashboard();

}


/* REQUEST LIST */

function loadRequests(){

let requests=getRequests();
let books=getBooks();

let container=document.getElementById("requestList");

container.innerHTML="";

requests.forEach((r,i)=>{

let book=books.find(b=>b.id===r.bookId);

container.innerHTML+=`

<div class="book-card">

${r.student} requested ${book.title}

<button onclick="approve(${i})">Approve</button>

</div>

`;

});

}


/* STUDENTS */

function loadStudents(){

let issued=getIssued();

let map={};

issued.forEach(b=>{
map[b.student]=(map[b.student]||0)+1;
});

let container=document.getElementById("studentList");

container.innerHTML="";

for(let s in map){

container.innerHTML+=`

<div class="book-card">

Student: ${s}
<br>
Books Issued: ${map[s]}

</div>

`;

}

}


/* BRANCH VIEW */

function showBranch(branch){

let books=getBooks();

let container=document.getElementById("branchBooks");

container.innerHTML="";

document.getElementById("branchTitle").textContent =
branch+" Library Books";

books.filter(b=>b.branch===branch)
.forEach(b=>{

container.innerHTML+=`

<div class="book-card">

${b.title}
<br>
Author: ${b.author}
<br>
Stock: ${b.stock}

</div>

`;

});

}


/* INITIAL LOAD */

loadDashboard();
loadBooks();
loadRequests();
loadStudents();


/* LOGOUT */

function logout(){

localStorage.removeItem("employeeId");

window.location.href="index.html";

}

</script>

</body>
</html>
