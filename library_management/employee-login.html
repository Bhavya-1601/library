<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Employee Login - LibNova</title>

<link rel="stylesheet" href="employee-login.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="login-card">

<div class="login-icon">
<i class="fa fa-book-open"></i>
</div>

<h2>Employee Portal</h2>

<p>Librarian Access</p>

<form id="employeeLoginForm">

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" id="empId" placeholder="Employee ID (EMP001)" required>
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="empPass" placeholder="Password" required>
</div>

<button type="submit">
<i class="fa fa-right-to-bracket"></i> Login
</button>

<p id="errorMsg"></p>

</form>

</div>

<script>

document.getElementById("employeeLoginForm").addEventListener("submit",function(e){

e.preventDefault();

const id=document.getElementById("empId").value.trim();
const pass=document.getElementById("empPass").value.trim();

const validEmployees=["EMP001","EMP002","EMP003"];
const validPassword="1234";

if(validEmployees.includes(id) && pass===validPassword){

localStorage.setItem("employeeId",id);
window.location.href="employee-dashboard.html";

}else{

document.getElementById("errorMsg").textContent="Invalid Employee ID or Password";

}

});

</script>

</body>
</html>
